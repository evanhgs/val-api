services:
  val-db-dev:
    container_name: val-db-dev
    restart: unless-stopped
    image: postgres:16.8-alpine
    volumes:
      - ./.docker/postgres-localhost/data:/var/lib/postgresql/data
      - ./.docker/postgres-localhost/init/01-create-schemas.sql:/docker-entrypoint-initdb.d/01-create-schemas.sql:ro
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SCHEMA_DEV=${POSTGRES_SCHEMA_DEV}
      - POSTGRES_SCHEMA_TEST=${POSTGRES_SCHEMA_TEST}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mqtt-dev:
    image: eclipse-mosquitto
    container_name: mqtt-dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/entrypoint.sh:/mosquitto/entrypoint.sh:ro
      - mqtt_dev_data:/mosquitto/data
      - mqtt_dev_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    entrypoint: ["/mosquitto/entrypoint.sh"]

volumes:
  mqtt_dev_data:
  mqtt_dev_log:
